name: Scrape Competitors

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        working-directory: ./scraper
        env:
          HOODIE_REFRESH_TOKEN: ${{ secrets.HOODIE_REFRESH_TOKEN }}
        run: python scrape.py
        timeout-minutes: 20

      - name: Commit updated data
        run: |
          git config user.name "Affinity Intel Bot"
          git config user.email "bot@affinity.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-update $(date '+%Y-%m-%d %H:%M')"
          git pull --rebase || true
          git push
