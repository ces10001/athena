<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affinity Intel — Competitive Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --surface2: #1a1e28;
  --border: #252a36;
  --text: #e4e7ec;
  --text2: #8891a5;
  --accent: #22c55e;
  --accent-dim: rgba(34,197,94,0.08);
  --red: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

::selection { background: var(--accent); color: var(--bg); }

input[type="text"], input[type="search"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }

.app { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), #059669);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: var(--bg);
  font-family: 'Space Mono', monospace;
}

.logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.logo h1 span { color: var(--accent); }

.meta {
  font-size: 12px;
  color: var(--text2);
  font-family: 'Space Mono', monospace;
  text-align: right;
}

.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text2);
  margin-bottom: 6px;
  font-family: 'Space Mono', monospace;
}

.stat-value {
  font-size: 26px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'Space Mono', monospace;
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}

.panel-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text2);
  font-family: 'Space Mono', monospace;
  margin-bottom: 14px;
}

.search-box { position: relative; max-width: 500px; }
.search-box input { width: 100%; padding-left: 38px; font-size: 15px; }
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); color: var(--text2); font-size: 16px;
}

.chips { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; user-select: none;
  border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
}

.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.chip.you { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: var(--accent); font-weight: 700; }
.chip-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); flex-shrink: 0; }
.chip.on .chip-dot, .chip.you .chip-dot { background: var(--accent); }
.chip-n { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text2); margin-left: 2px; }

.btn {
  padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.btn:hover { border-color: var(--accent); color: var(--text); }

.cat-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.cat-tab {
  padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--text2);
  border: 1px solid transparent; transition: all 0.15s;
}
.cat-tab:hover { color: var(--text); background: var(--surface2); }
.cat-tab.on { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}

.table-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead th {
  background: var(--surface2); padding: 12px 14px; text-align: left;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text2); font-family: 'Space Mono', monospace; font-weight: 600;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2;
  white-space: nowrap;
}
thead th.yc { color: var(--accent); background: rgba(34,197,94,0.06); }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr:last-child { border-bottom: none; }

td { padding: 10px 14px; white-space: nowrap; }
td.pn { font-weight: 600; color: var(--text); max-width: 280px; white-space: normal; word-break: break-word; }
td.dim { color: var(--text2); font-size: 12px; }
td.pr { font-family: 'Space Mono', monospace; font-weight: 600; font-size: 13px; }
td.pr.yp { color: var(--accent); background: rgba(34,197,94,0.04); }
td.pr.lo { color: var(--accent); }
td.pr.hi { color: var(--red); }
td.pr.na { color: var(--text2); font-weight: 400; font-style: italic; }

.diff {
  display: inline-block; font-size: 10px; padding: 1px 5px;
  border-radius: 4px; margin-left: 4px; font-weight: 700;
}
.diff.dn { background: rgba(34,197,94,0.15); color: var(--accent); }
.diff.up { background: rgba(239,68,68,0.15); color: var(--red); }

.info-bar {
  padding: 14px 20px; font-size: 12px; color: var(--text2);
  font-family: 'Space Mono', monospace; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}

.empty { padding: 60px 20px; text-align: center; color: var(--text2); }
.empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 100px 20px; flex-direction: column; gap: 16px;
}
.spin {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: sp 0.8s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }

.row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

@media (max-width: 768px) {
  .header { flex-direction: column; align-items: flex-start; }
  .meta { text-align: left; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(new Set());
  const [cat, setCat] = useState("All");
  const [comp, setComp] = useState(true);

  useEffect(() => {
    fetch("dashboard_data.json?t=" + Date.now())
      .then(r => r.json())
      .then(d => {
        setData(d);
        const all = getDisps(d.products || []);
        const aff = all.filter(x => x.toLowerCase().includes("affinity"));
        const rest = all.filter(x => !x.toLowerCase().includes("affinity")).slice(0, 5);
        setSel(new Set([...aff, ...rest]));
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  if (loading) return <div className="app"><div className="loading"><div className="spin"/><span style={{color:'var(--text2)',fontSize:14}}>Loading intel...</span></div></div>;
  if (!data?.products?.length) return <div className="app"><Hdr d={data}/><div className="empty"><h3>No data yet</h3><p>Run the scraper first.</p></div></div>;

  return (
    <div className="app">
      <Hdr d={data}/>
      <Stats d={data}/>
      <Ctrl data={data} q={q} setQ={setQ} sel={sel} setSel={setSel} cat={cat} setCat={setCat} comp={comp} setComp={setComp}/>
      <Tbl data={data} q={q} sel={sel} cat={cat} comp={comp}/>
    </div>
  );
}

function Hdr({d}) {
  const t = d?.scraped_at ? new Date(d.scraped_at).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}) : "—";
  return <div className="header"><div className="logo"><div className="logo-icon">A</div><h1>Affinity <span>Intel</span></h1></div><div className="meta"><div>Scraped: {t}</div><div>Source: {d?.source||"—"}</div></div></div>;
}

function Stats({d}) {
  const s = d?.stats||{};
  return <div className="stats-bar">
    {[["Products",s.total_products||s.total_active_skus||s.all_products||0],["Dispensaries",s.dispensaries||0],["Comparable",s.comparable||0],["Deals",s.deals||0]].map(([l,v])=>
      <div key={l} className="stat"><div className="stat-label">{l}</div><div className="stat-value">{v.toLocaleString()}</div></div>
    )}
  </div>;
}

function getDisps(prods) {
  const s = new Set();
  prods.forEach(p => Object.keys(p.dispensaries||{}).forEach(d => s.add(d)));
  return [...s].sort((a,b)=>{
    const aa=a.toLowerCase().includes("affinity"),bb=b.toLowerCase().includes("affinity");
    if(aa&&!bb) return -1; if(!aa&&bb) return 1; return a.localeCompare(b);
  });
}

function getCats(prods) {
  const s = new Set();
  prods.forEach(p => s.add(p.category||"Other"));
  return ["All",...[...s].sort()];
}

function Ctrl({data,q,setQ,sel,setSel,cat,setCat,comp,setComp}) {
  const prods = data.products||[];
  const disps = useMemo(()=>getDisps(prods),[prods]);
  const cats = useMemo(()=>getCats(prods),[prods]);
  const counts = useMemo(()=>{
    const c={};
    disps.forEach(d=>c[d]=0);
    prods.forEach(p=>Object.keys(p.dispensaries||{}).forEach(d=>c[d]=(c[d]||0)+1));
    return c;
  },[prods,disps]);

  const tog = useCallback(d=>{
    setSel(prev=>{const n=new Set(prev);if(n.has(d))n.delete(d);else n.add(d);return n;});
  },[setSel]);

  return <>
    <div className="panel">
      <div className="panel-title">🔍 Search Products</div>
      <div className="search-box">
        <span className="search-icon">⌕</span>
        <input type="search" placeholder="Search product name, brand, strain..." value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
    </div>

    <div className="panel">
      <div className="row" style={{justifyContent:'space-between',marginBottom:14}}>
        <span className="panel-title" style={{margin:0}}>☑ Select Dispensaries</span>
        <div className="row">
          <button className="btn" onClick={()=>setSel(new Set(disps))}>All</button>
          <button className="btn" onClick={()=>setSel(new Set(disps.filter(d=>d.toLowerCase().includes("affinity"))))}>Affinity Only</button>
          <button className="btn" onClick={()=>{const a=disps.filter(d=>d.toLowerCase().includes("affinity"));setSel(new Set([...a,...disps.filter(d=>!d.toLowerCase().includes("affinity")).slice(0,5)]));}} >Reset</button>
        </div>
      </div>
      <div className="chips">
        {disps.map(d=>{
          const isY=d.toLowerCase().includes("affinity");
          const on=sel.has(d);
          return <div key={d} className={`chip ${on?"on":""} ${isY?"you":""}`} onClick={()=>tog(d)}>
            <span className="chip-dot"/>{d}<span className="chip-n">{counts[d]}</span>
          </div>;
        })}
      </div>
      <div className="row" style={{marginTop:12}}>
        <label style={{fontSize:12,color:'var(--text2)',cursor:'pointer'}}>
          <input type="checkbox" checked={comp} onChange={e=>setComp(e.target.checked)} style={{marginRight:6}}/>
          Only show products at 2+ selected dispensaries
        </label>
      </div>
    </div>

    <div className="cat-tabs">
      {cats.map(c=><div key={c} className={`cat-tab ${cat===c?"on":""}`} onClick={()=>setCat(c)}>{c}</div>)}
    </div>
  </>;
}

function Tbl({data,q,sel,cat,comp}) {
  const prods = data.products||[];
  const cols = useMemo(()=>[...sel].sort((a,b)=>{
    const aa=a.toLowerCase().includes("affinity"),bb=b.toLowerCase().includes("affinity");
    if(aa&&!bb)return-1;if(!aa&&bb)return 1;return a.localeCompare(b);
  }),[sel]);

  const rows = useMemo(()=>{
    let items = prods;
    if(cat!=="All") items=items.filter(p=>p.category===cat);
    if(q.trim()){
      const s=q.toLowerCase();
      items=items.filter(p=>(p.name||"").toLowerCase().includes(s)||(p.brand||"").toLowerCase().includes(s)||(p.category||"").toLowerCase().includes(s));
    }
    items=items.filter(p=>{
      const d=Object.keys(p.dispensaries||{});
      const n=d.filter(x=>sel.has(x)).length;
      return comp?n>=2:n>=1;
    });
    return items;
  },[prods,q,sel,cat,comp]);

  const affCols = cols.filter(d=>d.toLowerCase().includes("affinity"));
  const getYP = p=>{for(const d of affCols){if(p.dispensaries?.[d])return p.dispensaries[d];}return null;};

  return <div className="table-wrap">
    <div className="info-bar">
      <span>{rows.length} product{rows.length!==1?"s":""}</span>
      <span>{cols.length} dispensar{cols.length!==1?"ies":"y"}</span>
    </div>
    {!rows.length?<div className="empty"><h3>No matches</h3><p>Try a different search or select more dispensaries.</p></div>:
    <div className="table-scroll"><table>
      <thead><tr>
        <th style={{minWidth:200}}>Product</th>
        <th>Brand</th>
        <th>Cat</th>
        {cols.map(d=>{
          const y=d.toLowerCase().includes("affinity");
          const sh=d.replace(/Dispensary\s*-?\s*/g,"").replace(/ - /g," ");
          return <th key={d} className={y?"yc":""}>{y?"★ ":""}{sh}</th>;
        })}
      </tr></thead>
      <tbody>
        {rows.slice(0,300).map((p,i)=>{
          const prices=cols.map(d=>p.dispensaries?.[d]??null);
          const valid=prices.filter(x=>x&&x>0);
          const mn=valid.length?Math.min(...valid):null;
          const mx=valid.length?Math.max(...valid):null;
          const yp=getYP(p);

          return <tr key={i}>
            <td className="pn">{p.name}</td>
            <td className="dim">{p.brand}</td>
            <td className="dim">{p.category}</td>
            {cols.map(d=>{
              const pr=p.dispensaries?.[d];
              const y=d.toLowerCase().includes("affinity");
              if(!pr) return <td key={d} className="pr na">—</td>;

              let c="pr";
              if(y) c+=" yp";
              else if(valid.length>1&&pr===mn) c+=" lo";
              else if(valid.length>1&&pr===mx) c+=" hi";

              let df=null;
              if(!y&&yp&&yp>0){
                const pct=((pr-yp)/yp*100).toFixed(0);
                if(pct>0) df=<span className="diff up">+{pct}%</span>;
                else if(pct<0) df=<span className="diff dn">{pct}%</span>;
              }

              return <td key={d} className={c}>${pr.toFixed(2)}{df}</td>;
            })}
          </tr>;
        })}
      </tbody>
    </table></div>}
    {rows.length>300&&<div className="info-bar"><span>Showing 300 of {rows.length}. Narrow your search.</span></div>}
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
