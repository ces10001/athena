<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affinity Intel — CT Competitive Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #000000;
  --bg2: #060a10;
  --surface: #0c1219;
  --surface2: #111b26;
  --border: rgba(0,210,230,0.10);
  --border2: rgba(0,210,230,0.20);
  --text: #c8e6ea;
  --text2: #4d7a85;
  --text3: #2a4a55;
  --cyan: #00d4e6;
  --cyan2: #00f0ff;
  --cyan-dim: rgba(0,212,230,0.06);
  --cyan-glow: rgba(0,212,230,0.15);
  --green: #00e676;
  --red: #ff3d57;
  --amber: #ffab40;
  --font: 'Outfit', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

::selection { background: var(--cyan); color: var(--bg); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 3px; }

.app { max-width: 1500px; margin: 0 auto; padding: 20px 24px; }

/* Header */
.hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.logo { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 42px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg, var(--cyan), #006070);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 700; font-size: 20px; color: var(--bg);
  box-shadow: 0 0 20px rgba(0,212,230,0.25);
}
.logo h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
.logo h1 b { color: var(--cyan); font-weight: 700; }
.meta { font-family: var(--mono); font-size: 11px; color: var(--text2); text-align: right; line-height: 1.6; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin-bottom: 20px; }
.stat {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
  transition: border-color 0.2s;
}
.stat:hover { border-color: var(--border2); }
.stat-l { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text2); margin-bottom: 5px; }
.stat-v { font-family: var(--mono); font-size: 24px; font-weight: 600; color: var(--cyan); }

/* Panels */
.panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 18px; margin-bottom: 14px;
}
.panel-t { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text2); margin-bottom: 12px; }

/* Map */
.map-wrap { height: 320px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 14px; }
.leaflet-container { background: var(--bg2) !important; }
.leaflet-tile { filter: brightness(0.35) saturate(0.3) hue-rotate(160deg) !important; }
.leaflet-control-zoom a { background: var(--surface) !important; color: var(--cyan) !important; border-color: var(--border) !important; }
.leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border2) !important; border-radius: 8px !important; box-shadow: 0 0 30px rgba(0,212,230,0.15) !important; }
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { font-family: var(--font) !important; font-size: 13px !important; margin: 10px 14px !important; }

/* Search */
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 14px;
  padding: 11px 14px 11px 40px; border-radius: 8px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,212,230,0.12); }
.search-wrap input::placeholder { color: var(--text3); }
.search-ic { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; max-height: 160px; overflow-y: auto; padding: 2px; }
.chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 500;
  cursor: pointer; user-select: none; transition: all 0.15s;
  border: 1px solid var(--border); background: var(--bg2); color: var(--text2);
}
.chip:hover { border-color: var(--cyan); color: var(--text); }
.chip.on { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
.chip.you { background: rgba(0,212,230,0.12); border-color: rgba(0,212,230,0.35); color: var(--cyan2); font-weight: 600; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.chip.on .chip-dot, .chip.you .chip-dot { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
.chip-n { font-family: var(--mono); font-size: 9px; opacity: 0.6; margin-left: 1px; }

/* Buttons */
.btn {
  padding: 5px 11px; border-radius: 6px; font-size: 10px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); font-family: var(--font); transition: all 0.15s;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.btn:hover { border-color: var(--cyan); color: var(--cyan); }

/* Category tabs */
.cats { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
.cat {
  padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 600;
  cursor: pointer; background: transparent; color: var(--text2);
  border: 1px solid transparent; transition: all 0.15s;
}
.cat:hover { color: var(--text); background: var(--surface); }
.cat.on { background: var(--cyan-dim); color: var(--cyan); border-color: rgba(0,212,230,0.25); }

/* Table */
.tw { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.ts { overflow-x: auto; }
.info { padding: 12px 18px; font-family: var(--mono); font-size: 11px; color: var(--text2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: var(--bg2); padding: 10px 12px; text-align: left;
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text2); font-weight: 600;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2;
  white-space: nowrap;
}
thead th.yc { color: var(--cyan); background: rgba(0,212,230,0.04); }

tbody tr { border-bottom: 1px solid rgba(0,210,230,0.05); transition: background 0.1s; }
tbody tr:hover { background: rgba(0,210,230,0.03); }
tbody tr:last-child { border-bottom: none; }

td { padding: 9px 12px; white-space: nowrap; }
td.pn { font-weight: 500; color: var(--text); max-width: 260px; white-space: normal; word-break: break-word; font-size: 12px; }
td.dim { color: var(--text2); font-size: 11px; }
td.pr { font-family: var(--mono); font-weight: 600; font-size: 12px; }
td.pr.yp { color: var(--cyan); background: rgba(0,212,230,0.04); }
td.pr.lo { color: var(--green); }
td.pr.hi { color: var(--red); }
td.pr.na { color: var(--text3); font-weight: 400; }

.diff { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-weight: 600; font-family: var(--mono); }
.diff.dn { background: rgba(0,230,118,0.12); color: var(--green); }
.diff.up { background: rgba(255,61,87,0.12); color: var(--red); }

.empty { padding: 50px 20px; text-align: center; color: var(--text2); }
.empty h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); font-weight: 500; }

.loading { display: flex; align-items: center; justify-content: center; padding: 80px 20px; flex-direction: column; gap: 14px; }
.spin { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: sp 0.7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }

.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.flex1 { flex: 1; min-width: 0; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
@media (max-width: 640px) {
  .hdr { flex-direction: column; align-items: flex-start; }
  .stats { grid-template-columns: repeat(2, 1fr); }
}

/* Glow line */
.glow-line { height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); margin: 20px 0; opacity: 0.3; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

// CT dispensary coordinates (approximate)
const COORDS = {
  "New Haven":[41.308,-72.928],"Bridgeport":[41.179,-73.189],"Orange":[41.278,-73.026],
  "Branford":[41.280,-72.815],"Hamden":[41.396,-72.897],"Derby":[41.327,-73.089],
  "Stratford":[41.185,-73.133],"Naugatuck":[41.486,-73.051],"Meriden":[41.538,-72.807],
  "Stamford":[41.053,-73.539],"Newington":[41.698,-72.723],"Waterbury":[41.558,-73.037],
  "Seymour":[41.397,-73.084],"Hartford":[41.764,-72.685],"Groton":[41.350,-72.078],
  "Milford":[41.222,-73.057],"Bristol":[41.672,-72.949],"Manchester":[41.776,-72.521],
  "Willimantic":[41.711,-72.208],"Norwalk":[41.118,-73.408],"Old Saybrook":[41.292,-72.376],
  "West Hartford":[41.762,-72.742],"Canton":[41.841,-72.898]
};

function App() {
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(new Set());
  const [cat,setCat]=useState("All");
  const [comp,setComp]=useState(true);
  const [mapHighlight,setMapHighlight]=useState(null);

  useEffect(()=>{
    fetch("dashboard_data.json?t="+Date.now())
      .then(r=>r.json())
      .then(d=>{
        setData(d);
        const all=getDisps(d.products||[]);
        const aff=all.filter(x=>x.toLowerCase().includes("affinity"));
        const rest=all.filter(x=>!x.toLowerCase().includes("affinity")).slice(0,5);
        setSel(new Set([...aff,...rest]));
        setLoading(false);
      })
      .catch(()=>setLoading(false));
  },[]);

  if(loading) return <div className="app"><div className="loading"><div className="spin"/><span style={{color:'var(--text2)',fontSize:13}}>Initializing intel feed...</span></div></div>;
  if(!data?.products?.length) return <div className="app"><Hdr d={data}/><div className="empty"><h3>No data yet</h3><p style={{fontSize:13}}>Run the scraper to populate data.</p></div></div>;

  return (
    <div className="app">
      <Hdr d={data}/>
      <Stats d={data}/>
      <div className="glow-line"/>
      <div className="grid2">
        <MapPanel data={data} sel={sel} highlight={mapHighlight} setHighlight={setMapHighlight}/>
        <DispPanel data={data} sel={sel} setSel={setSel}/>
      </div>
      <SearchPanel q={q} setQ={setQ}/>
      <CatTabs data={data} cat={cat} setCat={setCat}/>
      <Tbl data={data} q={q} sel={sel} cat={cat} comp={comp} setComp={setComp}/>
    </div>
  );
}

function Hdr({d}) {
  const t=d?.scraped_at?new Date(d.scraped_at).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}):"—";
  return <div className="hdr">
    <div className="logo"><div className="logo-mark">A</div><h1>AFFINITY <b>INTEL</b></h1></div>
    <div className="meta"><div>Last update: {t}</div><div>{d?.stats?.dispensary_count||0} dispensaries tracked</div></div>
  </div>;
}

function Stats({d}) {
  const s=d?.stats||{};
  const items=[
    ["Active SKUs",s.total_active||s.unique_products||0],
    ["Dispensaries",s.dispensary_count||0],
    ["Comparable",s.comparable||0],
    ["Deals",s.deals||0]
  ];
  return <div className="stats">{items.map(([l,v])=><div key={l} className="stat"><div className="stat-l">{l}</div><div className="stat-v">{(v||0).toLocaleString()}</div></div>)}</div>;
}

function MapPanel({data,sel,highlight,setHighlight}) {
  const mapRef=useRef(null);
  const mapObjRef=useRef(null);
  const markersRef=useRef([]);

  useEffect(()=>{
    if(!mapRef.current||mapObjRef.current) return;
    const m=L.map(mapRef.current,{zoomControl:true,attributionControl:false}).setView([41.4,-72.9],9);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(m);
    mapObjRef.current=m;
  },[]);

  useEffect(()=>{
    const m=mapObjRef.current;
    if(!m||!data) return;
    markersRef.current.forEach(mk=>m.removeLayer(mk));
    markersRef.current=[];

    const disps=data.dispensaries||{};
    const counts=data.stats?.dispensary_counts||{};

    Object.entries(disps).forEach(([name,info])=>{
      let lat=info.lat, lon=info.lon;
      if(!lat||!lon) {
        const c=COORDS[info.city];
        if(c){lat=c[0]+(Math.random()-0.5)*0.01;lon=c[1]+(Math.random()-0.5)*0.01;}
      }
      if(!lat||!lon) return;

      const isAff=name.toLowerCase().includes("affinity");
      const isSel=sel.has(name);
      const count=counts[name]||0;
      const size=isAff?14:isSel?10:7;
      const color=isAff?"#00f0ff":isSel?"#00d4e6":"#2a4a55";
      const opacity=isSel?1:0.5;

      const icon=L.divIcon({
        className:'',
        html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};box-shadow:0 0 ${isAff?12:6}px ${color};opacity:${opacity};border:1px solid rgba(255,255,255,0.2);"></div>`,
        iconSize:[size,size],iconAnchor:[size/2,size/2]
      });

      const mk=L.marker([lat,lon],{icon}).addTo(m);
      mk.bindPopup(`<b style="color:#00f0ff;">${name}</b><br>${info.city}<br><span style="color:#4d7a85;">${count} products</span>`);
      mk.on('click',()=>setHighlight(name));
      markersRef.current.push(mk);
    });
  },[data,sel]);

  return <div className="panel">
    <div className="panel-t">CT dispensary map</div>
    <div className="map-wrap" ref={mapRef}></div>
  </div>;
}

function getDisps(prods) {
  const s=new Set();
  prods.forEach(p=>Object.keys(p.dispensaries||{}).forEach(d=>s.add(d)));
  return [...s].sort((a,b)=>{
    const aa=a.toLowerCase().includes("affinity"),bb=b.toLowerCase().includes("affinity");
    if(aa&&!bb)return-1;if(!aa&&bb)return 1;return a.localeCompare(b);
  });
}

function DispPanel({data,sel,setSel}) {
  const prods=data.products||[];
  const disps=useMemo(()=>getDisps(prods),[prods]);
  const counts=useMemo(()=>{
    const c={};
    disps.forEach(d=>c[d]=0);
    prods.forEach(p=>Object.keys(p.dispensaries||{}).forEach(d=>c[d]=(c[d]||0)+1));
    return c;
  },[prods,disps]);

  const tog=useCallback(d=>{
    setSel(prev=>{const n=new Set(prev);if(n.has(d))n.delete(d);else n.add(d);return n;});
  },[setSel]);

  return <div className="panel">
    <div className="row" style={{justifyContent:'space-between',marginBottom:12}}>
      <span className="panel-t" style={{margin:0}}>Select dispensaries</span>
      <div className="row">
        <button className="btn" onClick={()=>setSel(new Set(disps))}>All</button>
        <button className="btn" onClick={()=>{const a=disps.filter(d=>d.toLowerCase().includes("affinity"));setSel(new Set(a));}}>Mine</button>
        <button className="btn" onClick={()=>{const a=disps.filter(d=>d.toLowerCase().includes("affinity"));const r=disps.filter(d=>!d.toLowerCase().includes("affinity")).slice(0,6);setSel(new Set([...a,...r]));}}>Reset</button>
      </div>
    </div>
    <div className="chips">
      {disps.map(d=>{
        const y=d.toLowerCase().includes("affinity");
        const on=sel.has(d);
        return <div key={d} className={`chip ${on?"on":""} ${y?"you":""}`} onClick={()=>tog(d)}>
          <span className="chip-dot"/>{d.replace("Dispensary - ","").replace("Dispensary ","")}<span className="chip-n">{counts[d]}</span>
        </div>;
      })}
    </div>
  </div>;
}

function SearchPanel({q,setQ}) {
  return <div className="panel">
    <div className="panel-t">Search products</div>
    <div className="search-wrap">
      <span className="search-ic">⌕</span>
      <input type="search" placeholder="Type a product name, brand, or strain..." value={q} onChange={e=>setQ(e.target.value)}/>
    </div>
  </div>;
}

function CatTabs({data,cat,setCat}) {
  const cats=useMemo(()=>{
    const s=new Set();
    (data.products||[]).forEach(p=>s.add(p.category||"Other"));
    return ["All",...[...s].sort()];
  },[data]);
  return <div className="cats">{cats.map(c=><div key={c} className={`cat ${cat===c?"on":""}`} onClick={()=>setCat(c)}>{c}</div>)}</div>;
}

function Tbl({data,q,sel,cat,comp,setComp}) {
  const prods=data.products||[];
  const cols=useMemo(()=>[...sel].sort((a,b)=>{
    const aa=a.toLowerCase().includes("affinity"),bb=b.toLowerCase().includes("affinity");
    if(aa&&!bb)return-1;if(!aa&&bb)return 1;return a.localeCompare(b);
  }),[sel]);

  const rows=useMemo(()=>{
    let items=prods;
    if(cat!=="All") items=items.filter(p=>p.category===cat);
    if(q.trim()){
      const s=q.toLowerCase();
      items=items.filter(p=>(p.name||"").toLowerCase().includes(s)||(p.brand||"").toLowerCase().includes(s));
    }
    items=items.filter(p=>{
      const d=Object.keys(p.dispensaries||{});
      const n=d.filter(x=>sel.has(x)).length;
      return comp?n>=2:n>=1;
    });
    return items;
  },[prods,q,sel,cat,comp]);

  const affCols=cols.filter(d=>d.toLowerCase().includes("affinity"));
  const getYP=p=>{for(const d of affCols){if(p.dispensaries?.[d])return p.dispensaries[d];}return null;};

  return <div className="tw">
    <div className="info">
      <span>{rows.length.toLocaleString()} product{rows.length!==1?"s":""}</span>
      <div className="row" style={{gap:14}}>
        <label style={{fontSize:11,color:'var(--text2)',cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
          <input type="checkbox" checked={comp} onChange={e=>setComp(e.target.checked)}/>
          Comparable only
        </label>
        <span>{cols.length} dispensar{cols.length!==1?"ies":"y"}</span>
      </div>
    </div>
    {!rows.length?<div className="empty"><h3>No matches</h3><p style={{fontSize:12}}>Adjust search, select more dispensaries, or uncheck comparable.</p></div>:
    <div className="ts"><table>
      <thead><tr>
        <th style={{minWidth:180}}>Product</th>
        <th>Brand</th>
        <th>Cat</th>
        {cols.map(d=>{
          const y=d.toLowerCase().includes("affinity");
          const sh=d.replace(/Dispensary\s*-?\s*/g,"").replace(/ - /g," ");
          return <th key={d} className={y?"yc":""}>{y?"★ ":""}{sh}</th>;
        })}
      </tr></thead>
      <tbody>
        {rows.slice(0,500).map((p,i)=>{
          const prices=cols.map(d=>p.dispensaries?.[d]??null);
          const valid=prices.filter(x=>x&&x>0);
          const mn=valid.length?Math.min(...valid):null;
          const mx=valid.length>1?Math.max(...valid):null;
          const yp=getYP(p);
          return <tr key={i}>
            <td className="pn">{p.name}</td>
            <td className="dim">{p.brand}</td>
            <td className="dim">{p.category}</td>
            {cols.map(d=>{
              const pr=p.dispensaries?.[d];
              const y=d.toLowerCase().includes("affinity");
              if(!pr) return <td key={d} className="pr na">—</td>;
              let c="pr";
              if(y) c+=" yp";
              else if(valid.length>1&&pr===mn) c+=" lo";
              else if(valid.length>1&&pr===mx) c+=" hi";
              let df=null;
              if(!y&&yp&&yp>0){
                const pct=Math.round((pr-yp)/yp*100);
                if(pct>0) df=<span className="diff up">+{pct}%</span>;
                else if(pct<0) df=<span className="diff dn">{pct}%</span>;
              }
              return <td key={d} className={c}>${pr.toFixed(2)}{df}</td>;
            })}
          </tr>;
        })}
      </tbody>
    </table></div>}
    {rows.length>500&&<div className="info"><span>Showing 500 of {rows.length.toLocaleString()}. Narrow your search.</span></div>}
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
